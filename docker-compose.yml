version: "3.8"

services:
  postgres:
    image: postgres:17-alpine
    container_name: yelp_postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: yelp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # Placeholder for future Message Broker (e.g., RabbitMQ, Redis, or Kafka)
  # rabbitmq:
  #   image: rabbitmq:3-management-alpine
  #   container_name: yelp_rabbitmq
  #   ports:
  #     - "5672:5672"
  #     - "15672:15672"
  #   restart: unless-stopped

volumes:
  postgres_data:
